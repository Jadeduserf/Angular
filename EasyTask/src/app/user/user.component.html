<app-card>
    <!--Event listener to the button ctrl + space to show list-->
    <button [class.active]="selected" (click)="onSelectUser()">
        <!--Property binding a a geeter on the imagePATH-->
        <img [src]="imagePath"  [alt]="user.name"/>
        <!--Interpolation to show the name of the user -->
        <span>{{ user.name }}</span>
    </button>
</app-card>
